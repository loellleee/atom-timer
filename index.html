#bg-overlay{position:fixed;inset:0;z-index:1;background:rgba(10,8,25,.30)}
.petal{position:fixed;top:-30px;font-size:var(--fs,14px);opacity:.9;animation:fall var(--dur,8s) linear var(--delay,0s) infinite;z-index:2;pointer-events:none}
@keyframes fall{
  0%{transform:translateX(0) rotate(0deg) translateY(0);opacity:.95}
  25%{transform:translateX(var(--sway1,20px)) rotate(90deg)}
  50%{transform:translateX(0) rotate(180deg);opacity:.7}
  75%{transform:translateX(var(--sway2,-15px)) rotate(270deg)}
  100%{transform:translateX(0) rotate(360deg) translateY(110vh);opacity:0}
}
#wrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
#card{
  width:100%;max-width:320px;
  background:rgba(12,10,28,.65);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border:1px solid rgba(255,200,220,.18);border-radius:28px;padding:24px 24px 20px;
}
#title{font-size:15px;color:rgba(255,200,220,.75);letter-spacing:.05em;margin-bottom:16px;text-align:center;font-family:'Pacifico',cursive}
#tabs{display:flex;gap:6px;margin-bottom:20px;background:rgba(255,255,255,.06);border-radius:14px;padding:4px}
#tabs button{flex:1;padding:7px 0;border:none;background:transparent;color:rgba(255,255,255,.4);font-size:13px;border-radius:10px;cursor:pointer;transition:all .2s}
#tabs button.active{background:rgba(255,160,185,.2);color:#ffb4c8;font-weight:500}
#time-display{font-size:68px;font-weight:800;letter-spacing:3px;color:#fff;text-align:center;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:4px;text-shadow:0 0 50px rgba(255,180,210,.25);transition:color .3s,text-shadow .3s}
#time-display.urgent{color:#ff8fa3;text-shadow:0 0 30px rgba(255,100,140,.6)}
#sublabel{font-size:11px;color:rgba(255,255,255,.25);text-align:center;margin-bottom:22px;letter-spacing:.1em;text-transform:uppercase}
#btns{display:flex;align-items:center;justify-content:center;gap:16px}
.btn-side{width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-side:hover{background:rgba(255,255,255,.13)}
.btn-main{width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,#ff7fa0,#ffb86c);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(255,100,140,.4);transition:all .2s}
.btn-main:hover{transform:scale(1.06);box-shadow:0 6px 32px rgba(255,100,140,.55)}
.btn-main:active{transform:scale(.96)}
#prog-wrap{width:100%;height:2px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:20px;overflow:hidden}
#prog-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,#ff7fa0,#ffb86c);transition:width .8s linear}
#done-msg{display:none;font-size:14px;color:#ffb4c8;text-align:center;margin-top:12px;letter-spacing:.05em}
</style>
</head>
<body>
<div id="bg"></div>
<div id="bg-overlay"></div>
<div id="wrap">
  <div id="card">
    <div id="title">🐾 Atom Timer</div>
    <div id="tabs">
      <button class="active" onclick="setMode(25,'Focus')">Focus</button>
      <button onclick="setMode(5,'Short')">Short</button>
      <button onclick="setMode(15,'Long')">Long</button>
    </div>
    <div id="time-display">25:00</div>
    <div id="sublabel">minutes remaining</div>
    <div id="btns">
      <button class="btn-side" onclick="addTime(-1)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button class="btn-main" onclick="toggleTimer()">
        <svg id="playIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pauseIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="btn-side" onclick="addTime(1)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div id="prog-wrap"><div id="prog-bar" style="width:100%"></div></div>
    <div id="done-msg">🌸 수고했어요!</div>
  </div>
</div>
<script>
for(let i=0;i<18;i++){
  const p=document.createElement('div');p.className='petal';
  p.textContent=['🌸','✿','❀','🌺'][i%4];
  const dur=7+Math.random()*9;
  p.style.cssText='left:'+Math.random()*100+'%;--dur:'+dur.toFixed(1)+'s;--delay:'+(Math.random()*10).toFixed(1)+'s;--fs:'+(9+Math.random()*9).toFixed(0)+'px;--sway1:'+(Math.random()*50-25).toFixed(0)+'px;--sway2:'+(Math.random()*50-25).toFixed(0)+'px';
  document.body.appendChild(p);
}
let total=25*60,remaining=total,ticker=null,running=false;
const disp=document.getElementById('time-display');
const bar=document.getElementById('prog-bar');
const playIcon=document.getElementById('playIcon');
const pauseIcon=document.getElementById('pauseIcon');
const doneMsg=document.getElementById('done-msg');
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function render(){disp.textContent=fmt(remaining);disp.classList.toggle('urgent',remaining<=60&&running);bar.style.width=(total>0?(remaining/total)*100:0)+'%'}
function stop(){clearInterval(ticker);ticker=null;running=false;playIcon.style.display='';pauseIcon.style.display='none'}
function setMode(mins,label){stop();document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('active',b.textContent===label));total=mins*60;remaining=total;doneMsg.style.display='none';render()}
function toggleTimer(){if(running){stop();return}if(remaining<=0)return;running=true;playIcon.style.display='none';pauseIcon.style.display='';doneMsg.style.display='none';ticker=setInterval(()=>{remaining--;render();if(remaining<=0){stop();doneMsg.style.display='block'}},1000)}
function addTime(m){const was=running;stop();total=Math.max(60,total+m*60);remaining=Math.max(0,Math.min(remaining+m*60,total));render();if(was&&remaining>0)toggleTimer()}
render();
</script>
</body>
</html>
